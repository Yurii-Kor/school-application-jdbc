jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: pom.xml

      - name: Check Docker availability
        run: docker version

      - name: Run Maven tests
        run: |
          mvn \
            --batch-mode \
            --no-transfer-progress \
            clean test

      - name: Publish test summary
        if: always()
        shell: bash
        run: |
          python3 <<'PY'
          import os
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          reports = sorted(
              Path("target/surefire-reports").glob("TEST-*.xml")
          )

          totals = {
              "tests": 0,
              "failures": 0,
              "errors": 0,
              "skipped": 0,
          }
          duration = 0.0

          for report in reports:
              root = ET.parse(report).getroot()

              for key in totals:
                  totals[key] += int(root.attrib.get(key, 0))

              duration += float(root.attrib.get("time", 0.0))

          passed = (
              totals["tests"]
              - totals["failures"]
              - totals["errors"]
              - totals["skipped"]
          )

          summary = f"""## JDBC test results

          | Result | Count |
          |---|---:|
          | Test suites | {len(reports)} |
          | Total tests | {totals["tests"]} |
          | Passed | {passed} |
          | Failures | {totals["failures"]} |
          | Errors | {totals["errors"]} |
          | Skipped | {totals["skipped"]} |
          | Reported duration | {duration:.3f} s |
          """

          print(summary)

          with open(
              os.environ["GITHUB_STEP_SUMMARY"],
              "a",
              encoding="utf-8",
          ) as summary_file:
              summary_file.write(summary)

          if not reports:
              print("No Surefire XML reports were generated.")
              sys.exit(1)

          if totals["tests"] == 0:
              print("Surefire reports contain zero tests.")
              sys.exit(1)

          if totals["failures"] > 0 or totals["errors"] > 0:
              print("One or more tests failed.")
              sys.exit(1)

          print("All tests completed successfully.")
          PY

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jdbc-test-reports
          path: target/surefire-reports/
          if-no-files-found: warn
          retention-days: 14
