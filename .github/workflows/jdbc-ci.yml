name: JDBC School Application CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: jdbc-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: pom.xml

      - name: Check Docker availability
        run: docker version

      - name: Run Maven tests
        run: |
          mvn \
            --batch-mode \
            --no-transfer-progress \
            clean test

      - name: Publish test summary
        if: always()
        shell: bash
        run: |
          python3 <<'PY'
          import os
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          reports = sorted(
              Path("target/surefire-reports").glob("TEST-*.xml")
          )

          totals = {
              "tests": 0,
              "failures": 0,
              "errors": 0,
              "skipped": 0,
          }
          duration = 0.0

          for report in reports:
              root = ET.parse(report).getroot()

              for key in totals:
                  totals[key] += int(root.attrib.get(key, 0))

              duration += float(root.attrib.get("time", 0.0))

          passed = (
              totals["tests"]
              - totals["failures"]
              - totals["errors"]
              - totals["skipped"]
          )

          summary = f"""## JDBC test results

          | Result | Count |
          |---|---:|
          | Test suites | {len(reports)} |
          | Total tests | {totals["tests"]} |
          | Passed | {passed} |
          | Failures | {totals["failures"]} |
          | Errors | {totals["errors"]} |
          | Skipped | {totals["skipped"]} |
          | Reported duration | {duration:.3f} s |
          """

          print(summary)

          with open(
              os.environ["GITHUB_STEP_SUMMARY"],
              "a",
              encoding="utf-8",
          ) as summary_file:
              summary_file.write(summary)

          if not reports:
              print("No Surefire XML reports were generated.")
              sys.exit(1)

          if totals["tests"] == 0:
              print("Surefire reports contain zero tests.")
              sys.exit(1)

          if totals["failures"] > 0 or totals["errors"] > 0:
              print("One or more tests failed.")
              sys.exit(1)

          print("All tests completed successfully.")
          PY

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jdbc-test-reports
          path: target/surefire-reports/
          if-no-files-found: warn
          retention-days: 14
  
  build:
    name: Build executable JAR
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: pom.xml

      - name: Package application
        run: |
          mvn \
            --batch-mode \
            --no-transfer-progress \
            clean package \
            -DskipTests

      - name: Verify executable JAR
        shell: bash
        run: |
          jar_path="target/SchoolApplication-0.0.1-SNAPSHOT.jar"

          if [[ ! -f "$jar_path" ]]; then
            echo "Expected JAR was not created: $jar_path"
            exit 1
          fi

          if ! jar tf "$jar_path" \
              | grep -q '^ua/foxminded/schoolapplication/App.class$'; then
            echo "Application main class was not found in the JAR."
            exit 1
          fi

          rm -rf .jar-check
          mkdir .jar-check

          (
            cd .jar-check
            jar xf "../$jar_path" META-INF/MANIFEST.MF
          )

          if ! tr -d '\r' \
              < .jar-check/META-INF/MANIFEST.MF \
              | grep -q '^Main-Class: ua.foxminded.schoolapplication.App$'; then
            echo "The JAR manifest does not contain the expected Main-Class."
            exit 1
          fi

          jar_size=$(du -h "$jar_path" | cut -f1)
          jar_sha256=$(sha256sum "$jar_path" | cut -d' ' -f1)

          {
            echo "## Executable JAR build"
            echo
            echo "| Property | Value |"
            echo "|---|---|"
            echo "| File | \`$(basename "$jar_path")\` |"
            echo "| Size | $jar_size |"
            echo "| Main class | \`ua.foxminded.schoolapplication.App\` |"
            echo "| SHA-256 | \`$jar_sha256\` |"
          } >> "$GITHUB_STEP_SUMMARY"

          rm -rf .jar-check

          echo "Executable JAR verified successfully."

      - name: Upload executable JAR
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: school-application-jdbc-${{ github.run_number }}
          path: target/SchoolApplication-0.0.1-SNAPSHOT.jar
          if-no-files-found: error
          retention-days: 14
