name: JDBC School Application CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: jdbc-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: pom.xml

      - name: Check Docker availability
        run: docker version

      - name: Build application and run tests
        run: |
          mvn \
            --batch-mode \
            --no-transfer-progress \
            clean verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jdbc-test-reports
          path: target/surefire-reports/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload executable JAR
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: school-application-jdbc
          path: target/SchoolApplication-0.0.1-SNAPSHOT.jar
          if-no-files-found: error
          retention-days: 14
